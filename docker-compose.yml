version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: signalfire-postgres
    environment:
      POSTGRES_DB: signalfire
      POSTGRES_USER: signalfire
      POSTGRES_PASSWORD: signalfire
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U signalfire']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
