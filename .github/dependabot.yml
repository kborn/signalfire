version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns:
          - 'typescript'
          - 'eslint*'
          - '@typescript-eslint/*'
          - 'prettier*'
          - 'turbo'
          - 'husky'
          - 'lint-staged'
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
