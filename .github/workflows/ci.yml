name: ci

on:
  pull_request:
  push:
    branches: [ main ]


jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Monorepo
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        env:
          DATABASE_URL: postgresql://postgres:dummy@dummy:5432/signalfire?schema=public
        run: pnpm api:prisma:generate

      - name: Monorepo lint
        continue-on-error: true
        run: pnpm lint

      - name: Monorepo typecheck
        continue-on-error: true
        run: pnpm typecheck

      - name: Monorepo build
        run: pnpm build

      - name: Monorepo test
        run: pnpm test
